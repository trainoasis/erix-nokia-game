<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Erix Nokia Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-wrapper">
    <div id="screen-frame">
      <div id="hud">
        <span id="hud-level">LVL 1</span>
        <span id="hud-score">0</span>
        <span id="hud-lives">&#9829;&#9829;&#9829;</span>
      </div>
      <canvas id="game-canvas"></canvas>
      <div id="overlay" class="hidden">
        <div id="overlay-text"></div>
        <div id="overlay-input" class="hidden">
          <input id="name-input" type="text" maxlength="12" placeholder="Your name" autocomplete="off" />
        </div>
        <div id="overlay-leaderboard" class="hidden"></div>
        <div id="overlay-sub"></div>
      </div>
    </div>
    <div id="dpad">
      <button class="dpad-btn" id="btn-up" aria-label="Up">&#9650;</button>
      <div class="dpad-mid">
        <button class="dpad-btn" id="btn-left" aria-label="Left">&#9664;</button>
        <div class="dpad-center"></div>
        <button class="dpad-btn" id="btn-right" aria-label="Right">&#9654;</button>
      </div>
      <button class="dpad-btn" id="btn-down" aria-label="Down">&#9660;</button>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="db.js"></script>
  <script src="sound.js"></script>
  <script src="game.js"></script>
</body>
</html>
