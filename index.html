<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Erix Nokia Game</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' fill='%23c7cf54'/><rect x='1' y='1' width='14' height='14' fill='%233a3a2a'/><rect x='2' y='2' width='12' height='12' fill='%23c7cf54'/><rect x='2' y='2' width='5' height='5' fill='%238a9a30'/><rect x='9' y='7' width='5' height='5' fill='%238a9a30'/><rect x='6' y='2' width='1' height='12' fill='%233a3a2a'/><rect x='2' y='6' width='12' height='1' fill='%233a3a2a'/><rect x='3' y='9' width='2' height='2' fill='%233a3a2a'/></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-wrapper">
    <div id="screen-frame">
      <div id="hud">
        <span id="hud-level">LVL 1</span>
        <span id="hud-score">0</span>
        <span id="hud-lives">&#9829;&#9829;&#9829;</span>
        <button id="hud-mute-btn" aria-label="Toggle sound" title="Toggle sound"></button>
        <button id="hud-lb-btn" aria-label="Leaderboard" title="Leaderboard (ESC)">ESC</button>
      </div>
      <canvas id="game-canvas"></canvas>
      <div id="overlay" class="hidden">
        <div id="overlay-text"></div>
        <div id="overlay-input" class="hidden">
          <input id="name-input" type="text" maxlength="20" placeholder="Name (3+ chars)" minlength="3" autocomplete="off" />
        </div>
        <div id="overlay-leaderboard" class="hidden"></div>
        <div id="overlay-sub"></div>
      </div>
    </div>
    <div id="error-toast" class="hidden"></div>
    <div id="dpad">
      <button class="dpad-btn" id="btn-up" aria-label="Up">&#9650;</button>
      <div class="dpad-mid">
        <button class="dpad-btn" id="btn-left" aria-label="Left">&#9664;</button>
        <div class="dpad-center"></div>
        <button class="dpad-btn" id="btn-right" aria-label="Right">&#9654;</button>
      </div>
      <button class="dpad-btn" id="btn-down" aria-label="Down">&#9660;</button>
    </div>
  </div>
  <script src="db.js"></script>
  <script src="sound.js"></script>
  <script src="game.js"></script>
</body>
</html>
